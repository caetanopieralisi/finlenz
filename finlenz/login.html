<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Entrar - Finlenz</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/auth.css">
</head>
<body class="auth-body">

<div id="debugBox" style="position:fixed;bottom:0;left:0;right:0;max-height:40vh;overflow:auto;background:#111;color:#0f0;font:11px monospace;padding:8px;z-index:9999;white-space:pre-wrap;"></div>

<div class="auth-wrap">
  <a href="index.html" class="brand brand--center">
    <img src="assets/img/logo.png" alt="Finlenz" class="brand__logo">
  </a>

  <div class="card auth-card">
    <div class="auth-tabs">
      <button class="auth-tab is-active" data-tab="login">Entrar</button>
      <button class="auth-tab" data-tab="signup">Criar conta</button>
    </div>

    <form id="loginForm" class="auth-form">
      <label>E-mail
        <input type="email" id="loginEmail" required placeholder="voce@email.com" autocomplete="email">
      </label>
      <label>Senha
        <input type="password" id="loginPassword" required placeholder="••••••••" autocomplete="current-password">
      </label>
      <p id="loginError" class="auth-error"></p>
      <button type="submit" class="btn btn-primary btn-block">Entrar</button>
    </form>

    <form id="signupForm" class="auth-form" hidden>
      <label>Nome
        <input type="text" id="signupName" required placeholder="Como podemos te chamar?">
      </label>
      <label>E-mail
        <input type="email" id="signupEmail" required placeholder="voce@email.com">
      </label>
      <label>Senha
        <input type="password" id="signupPassword" required minlength="6" placeholder="Mínimo 6 caracteres">
      </label>
      <label>Renda média mensal (opcional)
        <input type="number" id="signupIncome" placeholder="Ex: 1800" min="0" step="0.01">
      </label>
      <p id="signupError" class="auth-error"></p>
      <button type="submit" class="btn btn-primary btn-block">Criar minha conta</button>
    </form>

    <div class="auth-divider"><span>ou</span></div>

    <button id="demoBtn" class="btn btn-outline btn-block">» Iniciar conta demo</button>
    <p class="auth-demo-note">A conta demo já vem com dados de exemplo. Sempre que ela é aberta, os dados voltam ao original.</p>
  </div>
</div>

<script type="module" src="assets/js/theme.js"></script>
<script type="module" src="assets/js/auth.js"></script>
</body>
</html>
